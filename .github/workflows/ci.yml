name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: false # нет внешних go-зависимостей (нет go.sum) - кэшировать нечего

      # uv приносит Python 3.12 и LightGBM 4.6.0, чей wheel содержит нативную
      # lib_lightgbm.so, с которой линкуется cgo (см. README, "Архитектура").
      # libgomp на раннере Ubuntu уже есть.
      - name: Install uv
        # Версия пиннована: непиннованный installer делает раннер невоспроизводимым.
        run: |
          curl -LsSf https://astral.sh/uv/0.11.3/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Python deps (LightGBM + native lib)
        run: cd training && uv sync --no-default-groups

      - name: Lint (ruff)
        run: cd training && uv run --group dev ruff check .

      - name: Generate reference artifacts
        run: make -C training data

      - name: Format check (gofmt)
        run: make -C serving fmt-check

      - name: Vet
        run: make -C serving vet

      - name: Test (parity + concurrency)
        run: make -C serving test

      - name: Race detector
        run: make -C serving race

      - name: Benchmarks (smoke)
        run: make -C serving bench-smoke
